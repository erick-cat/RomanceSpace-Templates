<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>人际关系升温卡</title>
    <style>
      :root {
        --primary-color: #ff9a8b;
        --secondary-color: #ff6a88;
        --accent-color: #ff99ac;
        --text-color: #333;
        --light-text: #fff;
        --background-gradient: linear-gradient(135deg, #ff9a8b, #ff6a88);
        --card-background: rgba(255, 255, 255, 0.95);
        --shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background: var(--background-gradient);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }

      .container {
        width: 100%;
        max-width: 800px;
        background: var(--card-background);
        border-radius: 20px;
        box-shadow: var(--shadow);
        overflow: hidden;
        animation: fadeIn 0.8s ease-out;
      }

      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
      }

      .header {
        background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
        color: var(--light-text);
        padding: 30px;
        text-align: center;
      }

      .header h1 {
        font-size: 32px;
        margin-bottom: 10px;
        font-weight: 700;
      }

      .header p {
        font-size: 18px;
        opacity: 0.9;
      }

      .content {
        padding: 30px;
      }

      .greeting-section {
        text-align: center;
        margin-bottom: 40px;
      }

      .greeting {
        font-size: 28px;
        color: var(--primary-color);
        font-weight: 700;
        margin-bottom: 10px;
      }

      .greeting-message {
        font-size: 16px;
        color: var(--text-color);
        opacity: 0.8;
      }

      .memories-section {
        margin-bottom: 40px;
      }

      .section-title {
        font-size: 20px;
        color: var(--text-color);
        margin-bottom: 20px;
        font-weight: 600;
        text-align: center;
      }

      .memories-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 15px;
        margin-bottom: 20px;
      }

      .memory-card {
        background: linear-gradient(135deg, #f8f9fa, #e9ecef);
        border-radius: 10px;
        padding: 20px;
        text-align: center;
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        transition: transform 0.3s ease;
        animation: memoryIn 0.5s ease-out;
      }

      @keyframes memoryIn {
        from { opacity: 0; transform: scale(0.8); }
        to { opacity: 1; transform: scale(1); }
      }

      .memory-card:hover {
        transform: translateY(-5px);
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
      }

      .memory-icon {
        font-size: 30px;
        margin-bottom: 10px;
      }

      .memory-text {
        font-size: 16px;
        color: var(--text-color);
        font-weight: 500;
      }

      .qna-section {
        margin-bottom: 40px;
        padding: 20px;
        background: linear-gradient(135deg, #f8f9fa, #e9ecef);
        border-radius: 15px;
      }

      .qna-item {
        margin-bottom: 15px;
        animation: qnaIn 0.5s ease-out;
      }

      @keyframes qnaIn {
        from { opacity: 0; transform: translateX(-20px); }
        to { opacity: 1; transform: translateX(0); }
      }

      .qna-question {
        font-size: 16px;
        color: var(--primary-color);
        font-weight: 600;
        margin-bottom: 5px;
      }

      .qna-answer {
        font-size: 16px;
        color: var(--text-color);
        margin-left: 20px;
      }

      .message-section {
        margin-bottom: 30px;
      }

      .message-card {
        background: linear-gradient(135deg, var(--accent-color), var(--primary-color));
        color: var(--light-text);
        border-radius: 15px;
        padding: 25px;
        text-align: center;
        box-shadow: 0 10px 30px rgba(255, 154, 139, 0.3);
        animation: messageIn 0.8s ease-out;
      }

      @keyframes messageIn {
        from { opacity: 0; transform: scale(0.9); }
        to { opacity: 1; transform: scale(1); }
      }

      .message-text {
        font-size: 18px;
        line-height: 1.5;
        margin-bottom: 15px;
      }

      .message-sign {
        font-size: 16px;
        opacity: 0.9;
        font-style: italic;
      }

      .action-section {
        display: flex;
        justify-content: center;
        margin-bottom: 20px;
      }

      .primary-button {
        background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
        color: var(--light-text);
        border: none;
        padding: 15px 30px;
        border-radius: 50px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
        box-shadow: 0 5px 15px rgba(255, 154, 139, 0.3);
      }

      .primary-button:hover {
        transform: translateY(-3px);
        box-shadow: 0 8px 20px rgba(255, 154, 139, 0.4);
      }

      .primary-button:active {
        transform: translateY(0);
      }

      .footer {
        text-align: center;
        padding: 20px;
        background: #f8f9fa;
        border-top: 1px solid #e9ecef;
        font-size: 14px;
        color: var(--text-color);
        opacity: 0.8;
      }

      @media (max-width: 768px) {
        .container {
          margin: 10px;
        }

        .header {
          padding: 20px;
        }

        .header h1 {
          font-size: 28px;
        }

        .content {
          padding: 20px;
        }

        .greeting {
          font-size: 24px;
        }

        .memories-grid {
          grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
          gap: 10px;
        }

        .memory-card {
          padding: 15px;
        }

        .message-text {
          font-size: 16px;
        }

        .primary-button {
          padding: 12px 24px;
          font-size: 14px;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="header">
        <h1>人际关系升温卡</h1>
        <p>让我们的关系更加亲密</p>
      </div>
      
      <div class="content">
        <div class="greeting-section">
          <div class="greeting">你好，{{ nickname }}！</div>
          <div class="greeting-message">这是专属于我们的回忆卡片</div>
        </div>
        
        <div class="memories-section">
          <div class="section-title">共同回忆</div>
          <div class="memories-grid" id="memoriesGrid">
            <!-- 回忆卡片将通过JavaScript生成 -->
          </div>
        </div>
        
        <div class="qna-section">
          <div class="section-title">专属问答</div>
          <div class="qna-content" id="qnaContent">
            <!-- 问答内容将通过JavaScript生成 -->
          </div>
        </div>
        
        <div class="message-section">
          <div class="section-title">心意留言</div>
          <div class="message-card">
            <div class="message-text">{{ message }}</div>
            <div class="message-sign">—— 爱你的人</div>
          </div>
        </div>
        
        <div class="action-section">
          <button class="primary-button" id="shareBtn">分享给TA</button>
        </div>
      </div>
      
      <div class="footer">
        <p>愿我们的关系越来越美好</p>
      </div>
    </div>

    <script>
      document.addEventListener('DOMContentLoaded', function() {
        // 生成回忆卡片
        const memoriesGrid = document.getElementById('memoriesGrid');
        const memories = '{{ memories }}'.split(',').map(memory => memory.trim());
        const memoryIcons = ['🎬', '✈️', '🍽️', '🎵', '🎨', '🏞️', '📸', '🎉'];
        
        memories.forEach((memory, index) => {
          if (memory) {
            const memoryCard = document.createElement('div');
            memoryCard.className = 'memory-card';
            memoryCard.style.animationDelay = index * 0.1 + 's';
            memoryCard.innerHTML = `
              <div class="memory-icon">${memoryIcons[index % memoryIcons.length]}</div>
              <div class="memory-text">${memory}</div>
            `;
            memoriesGrid.appendChild(memoryCard);
          }
        });
        
        // 生成问答内容
        const qnaContent = document.getElementById('qnaContent');
        const qna = '{{ qna }}'.split('?').map(item => item.trim());
        
        for (let i = 0; i < qna.length - 1; i++) {
          const qnaItem = document.createElement('div');
          qnaItem.className = 'qna-item';
          qnaItem.style.animationDelay = i * 0.2 + 's';
          qnaItem.innerHTML = `
            <div class="qna-question">${qna[i]}?</div>
            <div class="qna-answer">${qna[i + 1].split(',').shift()}</div>
          `;
          qnaContent.appendChild(qnaItem);
        }
        
        // 分享按钮功能
        const shareBtn = document.getElementById('shareBtn');
        shareBtn.addEventListener('click', function() {
          if (navigator.share) {
            navigator.share({
              title: '人际关系升温卡',
              text: '这是我为你准备的专属卡片，快来看看吧！',
              url: window.location.href
            });
          } else {
            // 复制链接到剪贴板
            navigator.clipboard.writeText(window.location.href).then(function() {
              alert('链接已复制到剪贴板，快去分享给TA吧！');
            });
          }
        });
        
        // 回忆卡片点击效果
        const memoryCards = document.querySelectorAll('.memory-card');
        memoryCards.forEach(card => {
          card.addEventListener('click', function() {
            this.style.transform = 'scale(1.1)';
            setTimeout(() => {
              this.style.transform = 'translateY(-5px)';
            }, 200);
          });
        });
      });
    </script>
  </body>
</html>
