<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{title}}</title>
    <link rel="stylesheet" href="/assets/love_letter/style.css">
</head>

<body>
    <div class="letter-paper">
        <center>
            <h1>{{title}}</h1>
        </center>
        <div class="salutation">亲爱的 {{receiver}}，</div>
        <div class="content">{{paragraphs}}</div>
        <div class="signature">
            爱你的，<br>
            {{sender}}
        </div>
    </div>
    <script src="/assets/love_letter/script.js"></script>
</body>

</html>
