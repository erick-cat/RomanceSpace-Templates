<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>自我关怀疗愈室</title>
    <style>
      :root {
        --primary-color: #74b9ff;
        --secondary-color: #0984e3;
        --accent-color: #a29bfe;
        --text-color: #333;
        --light-text: #fff;
        --background-gradient: linear-gradient(135deg, #74b9ff, #0984e3);
        --card-background: rgba(255, 255, 255, 0.95);
        --shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background: var(--background-gradient);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
        position: relative;
        overflow: hidden;
      }

      .waves {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: 0;
        opacity: 0.3;
      }

      .wave {
        position: absolute;
        bottom: 0;
        left: 0;
        width: 200%;
        height: 100px;
        background: linear-gradient(to right, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0.2) 50%, rgba(255,255,255,0.1) 100%);
        animation: wave 10s linear infinite;
        transform-origin: bottom left;
      }

      .wave:nth-child(2) {
        animation-delay: -2s;
        animation-duration: 12s;
      }

      .wave:nth-child(3) {
        animation-delay: -4s;
        animation-duration: 14s;
      }

      @keyframes wave {
        0% { transform: translateX(0) translateY(0) scaleX(1); }
        50% { transform: translateX(-25%) translateY(-5px) scaleX(1.1); }
        100% { transform: translateX(-50%) translateY(0) scaleX(1); }
      }

      .container {
        width: 100%;
        max-width: 800px;
        background: var(--card-background);
        border-radius: 20px;
        box-shadow: var(--shadow);
        overflow: hidden;
        animation: fadeIn 0.8s ease-out;
        position: relative;
        z-index: 1;
      }

      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
      }

      .header {
        background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
        color: var(--light-text);
        padding: 30px;
        text-align: center;
      }

      .header h1 {
        font-size: 32px;
        margin-bottom: 10px;
        font-weight: 700;
      }

      .header p {
        font-size: 18px;
        opacity: 0.9;
      }

      .content {
        padding: 30px;
      }

      .breathing-section {
        text-align: center;
        margin-bottom: 40px;
      }

      .section-title {
        font-size: 20px;
        color: var(--text-color);
        margin-bottom: 20px;
        font-weight: 600;
        text-align: center;
      }

      .breathing-circle {
        width: 200px;
        height: 200px;
        border-radius: 50%;
        background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 20px;
        animation: breathe 8s infinite ease-in-out;
        box-shadow: 0 10px 30px rgba(116, 185, 255, 0.3);
      }

      @keyframes breathe {
        0%, 100% { transform: scale(1); opacity: 0.8; }
        50% { transform: scale(1.1); opacity: 1; }
      }

      .breathing-text {
        font-size: 18px;
        color: var(--light-text);
        font-weight: 600;
      }

      .breathing-instruction {
        font-size: 16px;
        color: var(--text-color);
        margin-top: 10px;
      }

      .mindfulness-section {
        margin-bottom: 40px;
        padding: 20px;
        background: linear-gradient(135deg, #f8f9fa, #e9ecef);
        border-radius: 15px;
      }

      .mindfulness-tip {
        font-size: 16px;
        line-height: 1.5;
        color: var(--text-color);
        text-align: center;
        margin-bottom: 20px;
      }

      .music-section {
        margin-bottom: 40px;
      }

      .music-player {
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 20px;
        background: linear-gradient(135deg, var(--accent-color), var(--primary-color));
        border-radius: 15px;
        color: var(--light-text);
      }

      .music-name {
        font-size: 18px;
        font-weight: 600;
        margin-bottom: 15px;
      }

      .music-controls {
        display: flex;
        gap: 20px;
        margin-bottom: 15px;
      }

      .control-button {
        width: 50px;
        height: 50px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.2);
        border: none;
        color: var(--light-text);
        font-size: 20px;
        cursor: pointer;
        transition: all 0.3s ease;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .control-button:hover {
        background: rgba(255, 255, 255, 0.3);
        transform: scale(1.1);
      }

      .progress-bar {
        width: 100%;
        max-width: 300px;
        height: 6px;
        background: rgba(255, 255, 255, 0.3);
        border-radius: 3px;
        overflow: hidden;
      }

      .progress-fill {
        height: 100%;
        background: var(--light-text);
        border-radius: 3px;
        width: 30%;
        animation: progress 10s linear infinite;
      }

      @keyframes progress {
        0% { width: 0; }
        100% { width: 100%; }
      }

      .affirmation-section {
        margin-bottom: 30px;
      }

      .affirmation-card {
        background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
        color: var(--light-text);
        border-radius: 15px;
        padding: 25px;
        text-align: center;
        box-shadow: 0 10px 30px rgba(116, 185, 255, 0.3);
        animation: affirmationIn 0.8s ease-out;
      }

      @keyframes affirmationIn {
        from { opacity: 0; transform: scale(0.9); }
        to { opacity: 1; transform: scale(1); }
      }

      .affirmation-text {
        font-size: 18px;
        line-height: 1.5;
        margin-bottom: 15px;
        font-weight: 600;
      }

      .action-section {
        display: flex;
        justify-content: center;
        margin-bottom: 20px;
      }

      .primary-button {
        background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
        color: var(--light-text);
        border: none;
        padding: 15px 30px;
        border-radius: 50px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
        box-shadow: 0 5px 15px rgba(116, 185, 255, 0.3);
      }

      .primary-button:hover {
        transform: translateY(-3px);
        box-shadow: 0 8px 20px rgba(116, 185, 255, 0.4);
      }

      .primary-button:active {
        transform: translateY(0);
      }

      .footer {
        text-align: center;
        padding: 20px;
        background: #f8f9fa;
        border-top: 1px solid #e9ecef;
        font-size: 14px;
        color: var(--text-color);
        opacity: 0.8;
      }

      @media (max-width: 768px) {
        .container {
          margin: 10px;
        }

        .header {
          padding: 20px;
        }

        .header h1 {
          font-size: 28px;
        }

        .content {
          padding: 20px;
        }

        .breathing-circle {
          width: 150px;
          height: 150px;
        }

        .breathing-text {
          font-size: 16px;
        }

        .music-controls {
          gap: 15px;
        }

        .control-button {
          width: 40px;
          height: 40px;
          font-size: 16px;
        }

        .affirmation-text {
          font-size: 16px;
        }

        .primary-button {
          padding: 12px 24px;
          font-size: 14px;
        }
      }
    </style>
  </head>
  <body>
    <div class="waves">
      <div class="wave"></div>
      <div class="wave"></div>
      <div class="wave"></div>
    </div>
    
    <div class="container">
      <div class="header">
        <h1>自我关怀疗愈室</h1>
        <p>给自己一个放松的空间</p>
      </div>
      
      <div class="content">
        <div class="breathing-section">
          <div class="section-title">呼吸引导</div>
          <div class="breathing-circle">
            <div class="breathing-text" id="breathingText">吸气</div>
          </div>
          <div class="breathing-instruction">跟随圆圈的节奏，{{ breath_rate }}秒吸气，{{ breath_rate }}秒呼气</div>
        </div>
        
        <div class="mindfulness-section">
          <div class="section-title">正念提示</div>
          <div class="mindfulness-tip">{{ mindfulness_tip }}</div>
        </div>
        
        <div class="music-section">
          <div class="section-title">放松音乐</div>
          <div class="music-player">
            <div class="music-name">{{ relax_music }}</div>
            <div class="music-controls">
              <button class="control-button" id="prevBtn">⏮️</button>
              <button class="control-button" id="playBtn">▶️</button>
              <button class="control-button" id="nextBtn">⏭️</button>
            </div>
            <div class="progress-bar">
              <div class="progress-fill"></div>
            </div>
          </div>
        </div>
        
        <div class="affirmation-section">
          <div class="section-title">自我肯定</div>
          <div class="affirmation-card">
            <div class="affirmation-text">{{ affirmation }}</div>
          </div>
        </div>
        
        <div class="action-section">
          <button class="primary-button" id="relaxBtn">开始放松</button>
        </div>
      </div>
      
      <div class="footer">
        <p>你值得被爱和关怀，给自己一点时间</p>
      </div>
    </div>

    <script>
      document.addEventListener('DOMContentLoaded', function() {
        // 呼吸引导动画
        const breathingText = document.getElementById('breathingText');
        const breathRate = parseInt('{{ breath_rate }}');
        let isInhaling = true;
        
        function updateBreathingText() {
          breathingText.textContent = isInhaling ? '吸气' : '呼气';
          isInhaling = !isInhaling;
        }
        
        setInterval(updateBreathingText, breathRate * 1000);
        
        // 音乐控制
        const playBtn = document.getElementById('playBtn');
        let isPlaying = true;
        
        playBtn.addEventListener('click', function() {
          if (isPlaying) {
            playBtn.textContent = '⏸️';
            document.querySelector('.progress-fill').style.animationPlayState = 'paused';
          } else {
            playBtn.textContent = '▶️';
            document.querySelector('.progress-fill').style.animationPlayState = 'running';
          }
          isPlaying = !isPlaying;
        });
        
        // 放松按钮功能
        const relaxBtn = document.getElementById('relaxBtn');
        relaxBtn.addEventListener('click', function() {
          // 模拟放松引导
          const originalText = relaxBtn.textContent;
          relaxBtn.textContent = '放松中...';
          relaxBtn.disabled = true;
          
          setTimeout(() => {
            relaxBtn.textContent = originalText;
            relaxBtn.disabled = false;
            alert('放松练习已完成，感觉如何？');
          }, 10000);
        });
        
        // 随机生成自我肯定语句
        const affirmations = [
          '我值得被爱和关怀',
          '我足够好，我已经做得很好了',
          '我接纳自己的所有情绪',
          '我有能力面对任何挑战',
          '我对自己充满信心',
          '我值得拥有快乐和幸福',
          '我正在变得更好',
          '我珍惜并爱护自己'
        ];
        
        const affirmationText = document.querySelector('.affirmation-text');
        
        // 点击卡片更换自我肯定语句
        document.querySelector('.affirmation-card').addEventListener('click', function() {
          const randomIndex = Math.floor(Math.random() * affirmations.length);
          affirmationText.textContent = affirmations[randomIndex];
        });
      });
    </script>
  </body>
</html>
