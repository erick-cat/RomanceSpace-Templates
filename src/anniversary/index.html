<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#f48fb1">
    <title>{{title}}</title>
    <link rel="stylesheet" href="/assets/anniversary/style.css">
</head>

<body>
    <div class="container">
        <div class="hearts">💕</div>
        <h1 class="title">{{title}}</h1>
        <div class="names">{{names}}</div>
        <div class="counter">
            <div class="counter-value" id="days">—</div>
            <div class="counter-label">在一起的天数</div>
        </div>
        <p class="message">{{message}}</p>
    </div>
    <script>
        // startDate is injected server-side and is already a safe escaped string
        const startDate = new Date("{{startDate}}");
        function update() {
            const now = new Date();
            const diff = Math.floor((now - startDate) / 86400000);
            document.getElementById("days").textContent = isNaN(diff) ? "—" : diff;
        }
        update();
        setInterval(update, 60000);
    </script>
</body>

</html>
