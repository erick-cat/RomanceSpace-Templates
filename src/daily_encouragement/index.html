<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>日常鼓励充电站</title>
    <style>
      :root {
        --primary-color: #4361ee;
        --secondary-color: #3a0ca3;
        --accent-color: #f72585;
        --text-color: #333;
        --light-text: #fff;
        --background-gradient: linear-gradient(135deg, #4361ee, #3a0ca3);
        --card-background: rgba(255, 255, 255, 0.95);
        --shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background: var(--background-gradient);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }

      .container {
        width: 100%;
        max-width: 800px;
        background: var(--card-background);
        border-radius: 20px;
        box-shadow: var(--shadow);
        overflow: hidden;
        animation: fadeIn 0.8s ease-out;
      }

      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
      }

      .header {
        background: linear-gradient(135deg, #4cc9f0, #4361ee);
        color: var(--light-text);
        padding: 30px;
        text-align: center;
      }

      .header h1 {
        font-size: 28px;
        margin-bottom: 10px;
        font-weight: 700;
      }

      .header p {
        font-size: 16px;
        opacity: 0.9;
      }

      .content {
        padding: 30px;
      }

      .greeting {
        text-align: center;
        margin-bottom: 30px;
      }

      .greeting h2 {
        font-size: 24px;
        color: var(--primary-color);
        margin-bottom: 10px;
      }

      .quote-section {
        background: linear-gradient(135deg, #f8f9fa, #e9ecef);
        border-radius: 15px;
        padding: 25px;
        margin-bottom: 30px;
        text-align: center;
        position: relative;
        box-shadow: inset 0 2px 10px rgba(0, 0, 0, 0.05);
      }

      .quote-section::before {
        content: '"';
        position: absolute;
        top: -10px;
        left: 20px;
        font-size: 60px;
        color: var(--primary-color);
        opacity: 0.3;
      }

      .quote {
        font-size: 18px;
        line-height: 1.5;
        color: var(--text-color);
        margin-bottom: 15px;
      }

      .mood-section {
        display: flex;
        flex-direction: column;
        align-items: center;
        margin-bottom: 30px;
      }

      .mood-title {
        font-size: 18px;
        color: var(--text-color);
        margin-bottom: 15px;
      }

      .mood-meter {
        width: 100%;
        max-width: 400px;
        height: 20px;
        background: #e9ecef;
        border-radius: 10px;
        overflow: hidden;
        margin-bottom: 10px;
      }

      .mood-fill {
        height: 100%;
        background: linear-gradient(90deg, #f72585, #4cc9f0);
        border-radius: 10px;
        transition: width 1s ease-out;
      }

      .mood-score {
        font-size: 16px;
        color: var(--primary-color);
        font-weight: 600;
      }

      .streak-section {
        display: flex;
        flex-direction: column;
        align-items: center;
        margin-bottom: 30px;
        padding: 20px;
        background: rgba(67, 97, 238, 0.1);
        border-radius: 15px;
      }

      .streak-icon {
        font-size: 40px;
        color: var(--accent-color);
        margin-bottom: 10px;
      }

      .streak-days {
        font-size: 24px;
        font-weight: 700;
        color: var(--primary-color);
        margin-bottom: 5px;
      }

      .streak-text {
        font-size: 14px;
        color: var(--text-color);
        opacity: 0.8;
      }

      .action-section {
        display: flex;
        justify-content: center;
        margin-bottom: 20px;
      }

      .primary-button {
        background: linear-gradient(135deg, var(--accent-color), #7209b7);
        color: var(--light-text);
        border: none;
        padding: 15px 30px;
        border-radius: 50px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
        box-shadow: 0 5px 15px rgba(247, 37, 133, 0.3);
      }

      .primary-button:hover {
        transform: translateY(-3px);
        box-shadow: 0 8px 20px rgba(247, 37, 133, 0.4);
      }

      .primary-button:active {
        transform: translateY(0);
      }

      .footer {
        text-align: center;
        padding: 20px;
        background: #f8f9fa;
        border-top: 1px solid #e9ecef;
        font-size: 14px;
        color: var(--text-color);
        opacity: 0.8;
      }

      .fireworks {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: 9999;
        opacity: 0;
        transition: opacity 0.5s ease;
      }

      .fireworks.active {
        opacity: 1;
      }

      @media (max-width: 768px) {
        .container {
          margin: 10px;
        }

        .header {
          padding: 20px;
        }

        .header h1 {
          font-size: 24px;
        }

        .content {
          padding: 20px;
        }

        .quote {
          font-size: 16px;
        }

        .primary-button {
          padding: 12px 24px;
          font-size: 14px;
        }
      }
    </style>
  </head>
  <body>
    <canvas class="fireworks" id="fireworks"></canvas>
    
    <div class="container">
      <div class="header">
        <h1>日常鼓励充电站</h1>
        <p>每天给自己一点力量</p>
      </div>
      
      <div class="content">
        <div class="greeting">
          <h2>你好，{{ user_name }}！</h2>
        </div>
        
        <div class="quote-section">
          <div class="quote">{{ daily_quote }}</div>
        </div>
        
        <div class="mood-section">
          <div class="mood-title">今日心情指数</div>
          <div class="mood-meter">
            <div class="mood-fill" style="width: {{ mood_score }}0%"></div>
          </div>
          <div class="mood-score">{{ mood_score }}/10</div>
        </div>
        
        <div class="streak-section">
          <div class="streak-icon">🔥</div>
          <div class="streak-days">{{ streak_days }}</div>
          <div class="streak-text">连续打卡天数</div>
        </div>
        
        <div class="action-section">
          <button class="primary-button" id="celebrateBtn">点亮今日</button>
        </div>
      </div>
      
      <div class="footer">
        <p>每一天都是新的开始，你值得所有美好</p>
      </div>
    </div>

    <script>
      document.addEventListener('DOMContentLoaded', function() {
        const celebrateBtn = document.getElementById('celebrateBtn');
        const fireworks = document.getElementById('fireworks');
        const ctx = fireworks.getContext('2d');
        
        // 设置canvas尺寸
        function resizeCanvas() {
          fireworks.width = window.innerWidth;
          fireworks.height = window.innerHeight;
        }
        
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);
        
        // 烟花效果
        function createFireworks() {
          fireworks.classList.add('active');
          
          const particles = [];
          const particleCount = 100;
          
          for (let i = 0; i < particleCount; i++) {
            particles.push({
              x: window.innerWidth / 2,
              y: window.innerHeight / 2,
              vx: (Math.random() - 0.5) * 10,
              vy: (Math.random() - 0.5) * 10,
              life: 1,
              maxLife: 2 + Math.random() * 2,
              size: 2 + Math.random() * 3,
              color: `hsl(${Math.random() * 360}, 100%, 70%)`
            });
          }
          
          function animate() {
            ctx.clearRect(0, 0, fireworks.width, fireworks.height);
            
            particles.forEach((particle, index) => {
              particle.life -= 0.02;
              particle.x += particle.vx;
              particle.y += particle.vy;
              particle.vy += 0.2;
              
              if (particle.life > 0) {
                ctx.beginPath();
                ctx.arc(particle.x, particle.y, particle.size, 0, Math.PI * 2);
                ctx.fillStyle = particle.color;
                ctx.globalAlpha = particle.life / particle.maxLife;
                ctx.fill();
              }
            });
            
            const aliveParticles = particles.filter(p => p.life > 0);
            if (aliveParticles.length > 0) {
              requestAnimationFrame(animate);
            } else {
              fireworks.classList.remove('active');
              ctx.clearRect(0, 0, fireworks.width, fireworks.height);
            }
          }
          
          animate();
        }
        
        // 点击按钮触发烟花
        celebrateBtn.addEventListener('click', function() {
          createFireworks();
          
          // 模拟更新心情指数
          const moodFill = document.querySelector('.mood-fill');
          const moodScore = document.querySelector('.mood-score');
          const currentScore = parseInt(moodScore.textContent);
          const newScore = Math.min(10, currentScore + 1);
          
          moodFill.style.width = newScore * 10 + '%';
          moodScore.textContent = newScore + '/10';
          
          // 模拟更新连续打卡天数
          const streakDays = document.querySelector('.streak-days');
          const currentStreak = parseInt(streakDays.textContent);
          streakDays.textContent = currentStreak + 1;
        });
      });
    </script>
  </body>
</html>
