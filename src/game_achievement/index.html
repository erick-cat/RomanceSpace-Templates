<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LOVE ACHIEVEMENT SYSTEM</title>
    <link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&display=swap" rel="stylesheet">
    <style>
        :root {
            --pixel-green: #4ade80;
            --pixel-orange: #fb923c;
            --pixel-black: #1a1a1a;
            --pixel-white: #f5f5f5;
            --pixel-border: 4px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            image-rendering: pixelated; /* 核心：保持像素锐利 */
        }

        body {
            background-color: #2d5a27; /* 复古草地绿 */
            background-image: 
                linear-gradient(45deg, #356a2e 25%, transparent 25%), 
                linear-gradient(-45deg, #356a2e 25%, transparent 25%), 
                linear-gradient(45deg, transparent 75%, #356a2e 75%), 
                linear-gradient(-45deg, transparent 75%, #356a2e 75%);
            background-size: 40px 40px;
            font-family: 'ZCOOL KuaiLe', 'Courier New', cursive;
            color: var(--pixel-black);
            display: flex;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .game-ui {
            width: 100%;
            max-width: 500px;
            background: var(--pixel-white);
            border: var(--pixel-border) solid var(--pixel-black);
            box-shadow: 8px 8px 0 rgba(0,0,0,0.2);
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* 顶部状态栏 */
        .status-bar {
            background: var(--pixel-black);
            color: white;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.8rem;
        }

        .hp-bar-container {
            width: 120px;
            height: 16px;
            background: #444;
            border: 2px solid #fff;
            position: relative;
        }

        .hp-fill {
            width: 85%;
            height: 100%;
            background: var(--pixel-green);
            transition: width 1s ease-in-out;
        }

        /* 成就网格 */
        .achievement-grid {
            padding: 20px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            flex-grow: 1;
        }

        .achievement-card {
            border: 3px solid var(--pixel-black);
            padding: 10px;
            text-align: center;
            background: #eee;
            transition: transform 0.1s;
            cursor: pointer;
            position: relative;
        }

        .achievement-card:hover {
            transform: translateY(-4px);
            background: #fff;
        }

        .icon {
            font-size: 2rem;
            margin-bottom: 5px;
        }

        .locked {
            filter: grayscale(1);
            opacity: 0.6;
        }

        /* 对话框 */
        .dialog-box {
            margin: 20px;
            padding: 15px;
            border: 3px solid var(--pixel-black);
            background: #fff;
            position: relative;
            min-height: 100px;
        }

        .dialog-box::after {
            content: "▼";
            position: absolute;
            bottom: 5px;
            right: 10px;
            animation: blink 0.8s infinite;
        }

        /* 按钮 */
        .pixel-btn {
            margin: 0 20px 20px;
            padding: 15px;
            background: var(--pixel-orange);
            border: 3px solid var(--pixel-black);
            box-shadow: 0 4px 0 #c2410c;
            color: white;
            font-size: 1.2rem;
            cursor: pointer;
            text-shadow: 2px 2px var(--pixel-black);
        }

        .pixel-btn:active {
            transform: translateY(4px);
            box-shadow: none;
        }

        /* 动画 */
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        @keyframes explode {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(2); opacity: 0; }
        }

        .particle {
            position: absolute;
            width: 10px;
            height: 10px;
            background: var(--pixel-orange);
            pointer-events: none;
        }

        @media (max-width: 400px) {
            .achievement-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div class="game-ui">
        <div class="status-bar">
            <div>
                <div>PLAYER: {{ player_name }}</div>
                <div>LEVEL: {{ love_level }}</div>
            </div>
            <div>
                <div style="margin-bottom: 4px;">LOVE HP</div>
                <div class="hp-bar-container">
                    <div class="hp-fill"></div>
                </div>
            </div>
        </div>

        <div style="padding: 10px 20px 0; font-size: 0.8rem; color: #666;">
            DAYS ACTIVE: {{ love_days }}
        </div>

        <div class="achievement-grid">
            <div class="achievement-card" onclick="showMsg('解锁成就：初次遇见！')">
                <div class="icon">🌱</div>
                <div style="font-size: 0.8rem;">新手村相遇</div>
            </div>
            <div class="achievement-card" onclick="showMsg('解锁成就：心动瞬间！')">
                <div class="icon">❤️</div>
                <div style="font-size: 0.8rem;">好感度突破</div>
            </div>
            <div class="achievement-card locked" onclick="showMsg('需消耗 99 个回忆碎片解锁')">
                <div class="icon">💍</div>
                <div style="font-size: 0.8rem;">终极誓言</div>
            </div>
            <div class="achievement-card" onclick="showMsg('成就：环游世界（1/10）')">
                <div class="icon">✈️</div>
                <div style="font-size: 0.8rem;">共同旅行</div>
            </div>
        </div>

        <div class="dialog-box">
            <p id="typing-text" style="font-size: 0.9rem;">
                {{ final_achievement }}<br><br>
                {{ rpg_quote }}
            </p>
        </div>

        <button class="pixel-btn" onclick="createExplosion(event)">解锁新回忆</button>
    </div>

    <script>
        function showMsg(text) {
            const box = document.getElementById('typing-text');
            box.innerText = "> " + text;
        }

        function createExplosion(e) {
            const btn = e.target;
            const rect = btn.getBoundingClientRect();
            
            for(let i=0; i<10; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                p.style.left = (e.clientX - rect.left) + 'px';
                p.style.top = (e.clientY - rect.top) + 'px';
                p.style.backgroundColor = ['#ff0', '#f0f', '#0ff'][Math.floor(Math.random()*3)];
                
                btn.appendChild(p);
                
                const angle = Math.random() * Math.PI * 2;
                const dist = Math.random() * 50 + 50;
                
                p.animate([
                    { transform: 'translate(0,0)', opacity: 1 },
                    { transform: `translate(${Math.cos(angle)*dist}px, ${Math.sin(angle)*dist}px)`, opacity: 0 }
                ], { duration: 600, easing: 'ease-out' }).onfinish = () => p.remove();
            }
        }
    </script>
</body>
</html>
